# BriefingClaw — ZeroClaw Configuration
# Location: ~/.zeroclaw/config.toml
#
# HYBRID MODEL ROUTING:
#   Sherlock Ohms + Bloom-borg → Frontier model (cloud) for deep research
#   Other agents using ZeroClaw → Local Granite model via Podman AI Lab
#
# The research agents need frontier-class reasoning and web search.
# Data-processing agents work with local files — they never phone home.

# ═══════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════

[global]
log_level = "info"
data_dir = "~/.zeroclaw/data"

# Default: local Granite (agents that don't override use this)
default_provider = "local"
default_model = "granite-8b"

# ═══════════════════════════════════════════════════════════
# MODEL PROVIDERS
# ═══════════════════════════════════════════════════════════

# --- LOCAL: Granite 8B via Podman AI Lab (on-device, air-gapped) ---
[providers.local]
type = "openai_compatible"
base_url = "http://127.0.0.1:8001/v1"
api_key = ""
model = "granite-8b"
max_tokens = 4096
temperature = 0.3

# --- FRONTIER OPTION A: Anthropic Claude (recommended) ---
[providers.anthropic]
type = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-sonnet-4-20250514"
max_tokens = 4096
temperature = 0.3

# --- FRONTIER OPTION B: OpenAI GPT ---
# Uncomment and set OPENAI_API_KEY to use instead of Anthropic
# [providers.openai]
# type = "openai"
# api_key = "${OPENAI_API_KEY}"
# model = "gpt-4o"
# max_tokens = 4096
# temperature = 0.3

# --- FRONTIER OPTION C: Google Gemini ---
# Uncomment and set GOOGLE_API_KEY to use instead of Anthropic
# [providers.google]
# type = "google"
# api_key = "${GOOGLE_API_KEY}"
# model = "gemini-2.0-flash"
# max_tokens = 4096
# temperature = 0.3

# ═══════════════════════════════════════════════════════════
# TOOLS
# ═══════════════════════════════════════════════════════════

[tools.web_search]
enabled = true
provider = "tavily"
api_key = "${TAVILY_API_KEY}"
max_results = 5

[tools.web_fetch]
enabled = true
timeout_seconds = 15
max_content_length = 50000

[tools.file_read]
enabled = true
allowed_paths = ["~/.zeroclaw/workspace"]

[tools.file_write]
enabled = true
allowed_paths = ["~/.zeroclaw/output"]

# ═══════════════════════════════════════════════════════════
# PROFILE: SHERLOCK OHMS — Executive Research
# Uses: FRONTIER model (web research + complex reasoning)
# ═══════════════════════════════════════════════════════════

[profiles.sherlock-ohms]
name = "Sherlock Ohms"
description = "Executive research — deep person-level intelligence"
skill_file = "~/briefingclaw/agents/executive-research/SKILL.md"
provider = "anthropic"       # ← Frontier model

system_prompt_prefix = """
You are Sherlock Ohms, an executive research specialist. Research the
specified person and produce a comprehensive executive profile.
Use web search and web fetch tools. Cite sources. Never fabricate.
Prioritize recent activity (last 6 months) over historical background.
"""

[profiles.sherlock-ohms.agent]
max_iterations = 8
auto_approve_tools = true
output_format = "markdown"
output_dir = "~/.zeroclaw/output/sherlock-ohms"

[profiles.sherlock-ohms.tools.web_search]
max_results = 8

# ═══════════════════════════════════════════════════════════
# PROFILE: BLOOM-BORG — Account Intelligence
# Uses: FRONTIER model (financial analysis + broad web research)
# ═══════════════════════════════════════════════════════════

[profiles.bloom-borg]
name = "Bloom-borg"
description = "Account intelligence — company-level analysis"
skill_file = "~/briefingclaw/agents/account-intelligence/SKILL.md"
provider = "anthropic"       # ← Frontier model

system_prompt_prefix = """
You are Bloom-borg, an account intelligence specialist. Research the
specified company and produce a comprehensive company brief.
Use web search and web fetch tools. Cite sources.
Connect every data point to briefing relevance.
"""

[profiles.bloom-borg.agent]
max_iterations = 10
auto_approve_tools = true
output_format = "markdown"
output_dir = "~/.zeroclaw/output/bloom-borg"

[profiles.bloom-borg.tools.web_search]
max_results = 10
